<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>jwc-registry</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  :root { color-scheme: dark; --bg:#0c0d10; --fg:#e7e9ee; --mut:#8a8f99; --line:#1f2127; --accent:#7aa2ff; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--fg); font:14px/1.5 ui-sans-serif,system-ui,sans-serif; }
  header { padding:14px 20px; border-bottom:1px solid var(--line); display:flex; align-items:center; gap:16px; }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .who { margin-left:auto; color:var(--mut); }
  main { max-width:920px; margin:24px auto; padding:0 16px; }
  section { margin:0 0 32px; }
  h2 { font-size:13px; text-transform:uppercase; letter-spacing:.08em; color:var(--mut); margin:0 0 10px; font-weight:600; }
  table { width:100%; border-collapse:collapse; }
  th,td { padding:8px 10px; text-align:left; border-bottom:1px solid var(--line); }
  th { font-weight:500; color:var(--mut); }
  td.mono, code { font-family:ui-monospace,SFMono-Regular,Consolas,monospace; }
  button, input { background:var(--line); color:var(--fg); border:1px solid #2a2d34; padding:6px 12px; border-radius:6px; font:inherit; }
  button { cursor:pointer; }
  button.primary { background:var(--accent); color:#000; border-color:var(--accent); }
  .row { display:flex; gap:8px; align-items:center; }
  .muted { color:var(--mut); }
  .upload { border:1px dashed #2a2d34; padding:18px; border-radius:8px; }
  .upload input[type=file] { background:transparent; padding:0; border:none; }
  pre.err { color:#ff6b6b; background:#1a1418; padding:10px; border-radius:6px; white-space:pre-wrap; }
  pre.ok { color:#8be09d; background:#101d14; padding:10px; border-radius:6px; white-space:pre-wrap; }
  a { color:var(--accent); }
  .empty { color:var(--mut); padding:20px; text-align:center; border:1px dashed var(--line); border-radius:8px; }
</style>
</head>
<body>
<header>
  <h1>jwc-registry</h1>
  <span class="muted">Package registry for the <a href="https://github.com/Nodirbek-Abdulaxadov/jwc-lang" target="_blank">JWC language</a></span>
  <span class="who" id="who"></span>
  <button id="loginBtn" class="primary">Sign in with Google</button>
  <button id="logoutBtn" style="display:none">Logout</button>
</header>
<main>
  <section id="uploadSection" style="display:none">
    <h2>Publish</h2>
    <div class="upload">
      <div class="row">
        <input id="pkgName" placeholder="package name (e.g. logger)">
        <input id="pkgVersion" placeholder="version (e.g. 0.1.0)">
        <input id="pkgFile" type="file" accept=".tar.gz,.tgz">
        <button id="uploadBtn" class="primary">Upload</button>
      </div>
      <div id="uploadResult"></div>
    </div>
  </section>

  <section>
    <h2>Packages</h2>
    <div id="pkgList"></div>
  </section>
</main>

<script>
const TOKEN_KEY = 'jwc-registry-token';
const $ = (id) => document.getElementById(id);

function getToken() { return localStorage.getItem(TOKEN_KEY); }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

async function api(path, opts = {}) {
  const headers = { ...(opts.headers || {}) };
  const t = getToken();
  if (t) headers['Authorization'] = `Bearer ${t}`;
  const r = await fetch(path, { ...opts, headers });
  if (!r.ok) throw new Error(`${r.status} ${await r.text()}`);
  return r;
}

async function refreshMe() {
  if (!getToken()) {
    $('who').textContent = 'not signed in';
    $('loginBtn').style.display = '';
    $('logoutBtn').style.display = 'none';
    $('uploadSection').style.display = 'none';
    return;
  }
  try {
    const r = await api('/api/v1/me');
    const me = await r.json();
    $('who').textContent = me.email;
    $('loginBtn').style.display = 'none';
    $('logoutBtn').style.display = '';
    $('uploadSection').style.display = '';
  } catch (e) {
    clearToken();
    refreshMe();
  }
}

async function refreshPackages() {
  const list = $('pkgList');
  list.innerHTML = '<div class="muted">Loading...</div>';
  try {
    const r = await fetch('/api/v1/pkg');
    const pkgs = await r.json();
    if (!pkgs.length) {
      list.innerHTML = '<div class="empty">No packages published yet.</div>';
      return;
    }
    const rows = pkgs.map((p) => `
      <tr>
        <td><a href="/api/v1/pkg/${encodeURIComponent(p.name)}" target="_blank">${p.name}</a></td>
        <td class="mono">${p.latest_version || '<span class="muted">—</span>'}</td>
        <td class="muted">${p.owner_email}</td>
        <td>${p.latest_version ? `<a href="/api/v1/pkg/${encodeURIComponent(p.name)}/${encodeURIComponent(p.latest_version)}/download">download</a>` : ''}</td>
      </tr>`).join('');
    list.innerHTML = `<table><thead><tr><th>name</th><th>latest</th><th>owner</th><th></th></tr></thead><tbody>${rows}</tbody></table>`;
  } catch (e) {
    list.innerHTML = `<pre class="err">${e.message}</pre>`;
  }
}

// OAuth callback handling — the registry's /api/v1/auth/google/callback returns
// {token,user} as JSON. To bridge into the browser we open a popup and post
// the body back via a tiny page. The simplest path: server returns JSON and a
// landing route reads `?code=` itself by re-running the flow client-side via
// fetch. For v1 simplicity we let the user paste the token from JSON.
$('loginBtn').onclick = () => {
  // Open Google auth in same tab; on success the callback returns JSON.
  // The user will see the JSON, copy `token`, then paste it via prompt.
  window.location.href = '/api/v1/auth/google/login';
};

// On load: detect `?token=` (server-side helper for browser flow can set this)
// or `?paste=1` (manual paste fallback).
(async function init() {
  const url = new URL(window.location.href);
  const tokenFromUrl = url.searchParams.get('token');
  if (tokenFromUrl) {
    setToken(tokenFromUrl);
    history.replaceState({}, '', '/');
  } else if (url.pathname === '/api/v1/auth/google/callback') {
    // Callback navigated us here as a same-tab redirect — the JSON body is
    // already visible; let the user paste the token. (Replaced in R5 by a
    // server-side HTML shim that posts the token straight back to /.)
  }
  $('logoutBtn').onclick = () => { clearToken(); refreshMe(); };
  $('uploadBtn').onclick = async () => {
    const name = $('pkgName').value.trim();
    const version = $('pkgVersion').value.trim();
    const file = $('pkgFile').files[0];
    const out = $('uploadResult');
    if (!name || !version || !file) {
      out.innerHTML = '<pre class="err">name + version + file are required</pre>';
      return;
    }
    const fd = new FormData();
    fd.append('file', file);
    try {
      const r = await api(`/api/v1/pkg/${encodeURIComponent(name)}/${encodeURIComponent(version)}`, {
        method: 'POST',
        body: fd,
      });
      const j = await r.json();
      out.innerHTML = `<pre class="ok">Published ${j.name}@${j.version}\nsha256: ${j.sha256}\nsize:   ${j.size_bytes} bytes</pre>`;
      refreshPackages();
    } catch (e) {
      out.innerHTML = `<pre class="err">${e.message}</pre>`;
    }
  };
  await refreshMe();
  await refreshPackages();
})();
</script>
</body>
</html>
